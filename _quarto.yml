project:
  type: book

book:
  title: "My PhD Thesis"
  author: "Po-Kai Yang"
  chapters:
    - index.qmd
    - chapters/01-intro.qmd
    - chapters/02-methods.qmd
    - chapters/03-results.qmd
    - chapters/04-discussion.qmd
    - chapters/05-conclusion.qmd
    - chapters/references.qmd

execute:
  echo: false
  warning: false
  message: false

bibliography: ref/references.bib
csl: ref/csl/american-medical-association.csl
suppress-bibliography: false

format:
  html:
    toc: true
    number-sections: true
  pdf:
    documentclass: book
    classoption: openany
    pdf-engine: xelatex
    fontsize: 12pt
    geometry:
      - left=3cm
      - right=2.5cm
      - top=3cm
      - bottom=2.5cm
    include-in-header:
      text: |
        \usepackage{fontspec}
        \usepackage{xeCJK}
        \usepackage{setspace}
        \usepackage{titlesec}
        \setmainfont[
          Path=/Applications/Microsoft Word.app/Contents/Resources/DFonts/,
          UprightFont=Calibri,
          BoldFont=Calibrib,
          ItalicFont=Calibrii,
          BoldItalicFont=Calibriz
        ]{Calibri}
        \setCJKmainfont[
          Path=/Applications/Microsoft Word.app/Contents/Resources/DFonts/,
          UprightFont=MSJH,
          BoldFont=MSJHBD
        ]{Microsoft JhengHei}
        \setstretch{1.5}
        \setlength{\parindent}{0pt}
        \setlength{\parskip}{6pt}
        \titleformat{\chapter}[block]
          {\centering\bfseries\fontsize{18}{27}\selectfont}
          {\chaptername\ \thechapter.}{0.5em}{}
        \titlespacing*{\chapter}{0pt}{-20pt}{24pt}
        \titleformat{\section}
          {\bfseries\fontsize{14}{21}\selectfont}
          {\thesection}{1em}{}
        \titlespacing*{\section}{0pt}{12pt}{6pt}
        \titleformat{\subsection}
          {\bfseries\fontsize{12}{18}\selectfont}
          {\thesubsection}{1em}{}
        \titlespacing*{\subsection}{0pt}{10pt}{4pt}
    toc: true
    number-sections: true
  docx:
    toc: true
    number-sections: true
